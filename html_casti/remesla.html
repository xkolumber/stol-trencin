<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Remeslá</title>
    <link rel="stylesheet" href="css/styles_main.css" />
  </head>
  <body>
    <div class="panel">
      <div class="header">
        <div class="header_first">
          <img class="img_header" src="../images/remesla_icon.svg" alt="Hry" />
          <div class="title">Remeslá</div>
        </div>
      </div>

      <div class="content">
        <div class="games-menu">
          <a href="cipkarstvo.html" class="remeslo-item">
            <div class="game-icon-wrapper">
              <img
                src="../images/cipkarstvo_svg_icon.svg"
                alt="Gastronómia"
                class="game-icon"
              />
              <h2>Čipkárstvo</h2>
            </div>
            <img
              src="../images/arrow_icon.svg"
              alt="Šípka"
              class="remeslo-arrow"
            />
          </a>

          <a href="gastronomia.html" class="remeslo-item">
            <div class="game-icon-wrapper">
              <img
                src="../images/gastro_icon.svg"
                alt="Gastronómia"
                class="game-icon"
              />
              <h2>Gastronómia</h2>
            </div>
            <img
              src="../images/arrow_icon.svg"
              alt="Šípka"
              class="remeslo-arrow"
            />
          </a>

          <a href="sklarstvo.html" class="remeslo-item">
            <div class="game-icon-wrapper">
              <img
                src="../images/sklarstvo_icon.svg"
                alt="Gastronómia"
                class="game-icon"
              />
              <h2>Sklárstvo</h2>
            </div>
            <img
              src="../images/arrow_icon.svg"
              alt="Šípka"
              class="remeslo-arrow"
            />
          </a>

          <a href="kovacstvo.html" class="remeslo-item">
            <div class="game-icon-wrapper">
              <img
                src="../images/kovacstvo_icon.svg"
                alt="Kováčstvo"
                class="game-icon"
              />
              <h2>Kováčstvo</h2>
            </div>
            <img
              src="../images/arrow_icon.svg"
              alt="Šípka"
              class="remeslo-arrow"
            />
          </a>
          <a href="kosikarstvo.html" class="remeslo-item">
            <div class="game-icon-wrapper">
              <img
                src="../images/kosikarstvo_icon.svg"
                alt="Košikárstvo"
                class="game-icon"
              />
              <h2>Košikárstvo</h2>
            </div>
            <img
              src="../images/arrow_icon.svg"
              alt="Šípka"
              class="remeslo-arrow"
            />
          </a>
        </div>
      </div>
    </div>

    <script src="js/script_main.js"></script>
  </body>
</html>
