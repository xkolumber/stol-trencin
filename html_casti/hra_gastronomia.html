<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Gastronómia</title>
    <link rel="stylesheet" href="css/styles_game.css" />
    <link rel="stylesheet" href="css/styles_main.css" />
  </head>
  <body>
    <div class="panel">
      <div class="header">
        <div class="header_first">
          <img class="img_header" src="../images/hra_gastronomia.svg" />
          <div class="title">Gastronómia</div>
        </div>
      </div>

      <div class="content">
        <div id="text3Page" class="page active">
          <div class="text-container">
            <section id="ingredients-game" class="game-panel">
              <section class="gastronomia_top" aria-label="Zadanie procesu">
                <div class="gastronomia_picture_text">
                  <img class="" src="assets/images/misa.svg" />

                  <p class="strong_p">Uvar tradičné slovenské perky</p>
                </div>

                <div class="recipe-status" aria-label="Stav receptu">
                  <span id="recipe-round">1/3</span>
                  <strong id="recipe-timer">12.0 </strong>
                </div>
              </section>

              <section class="recipe-board" aria-label="Skladanie receptu">
                <section class="recipe-card" aria-label="Aktualny recept">
                  <p class="column-title">Recept</p>
                  <h3 id="recipe-name">Zemiakove cesto</h3>
                  <p id="recipe-instruction" class="recipe-instruction"></p>
                  <div
                    id="recipe-targets"
                    class="recipe-targets"
                    aria-label="Potrebne ingrediencie"
                  ></div>
                  <div class="timing-track" aria-label="Cas do konca kola">
                    <span id="timing-fill"></span>
                  </div>
                  <p
                    id="recipe-feedback"
                    class="feedback"
                    aria-live="polite"
                  ></p>
                </section>

                <section class="mixing-zone" aria-label="Miska na miesanie">
                  <p class="column-title">Misa</p>
                  <div id="mixing-bowl" class="mixing-bowl">
                    <span class="steam steam-one" aria-hidden="true"></span>
                    <span class="steam steam-two" aria-hidden="true"></span>
                    <span class="steam steam-three" aria-hidden="true"></span>
                    <span class="bubble bubble-one" aria-hidden="true"></span>
                    <span class="bubble bubble-two" aria-hidden="true"></span>
                    <span class="bubble bubble-three" aria-hidden="true"></span>
                    <span class="cooking-surface" aria-hidden="true"></span>
                    <span class="stir-line stir-one" aria-hidden="true"></span>
                    <span class="stir-line stir-two" aria-hidden="true"></span>
                    <div
                      id="stage-product"
                      class="stage-product stage-board"
                      aria-hidden="true"
                    >
                      <img
                        class="scene-image scene-board"
                        src="assets/ingredients/cutting-board.svg"
                        alt=""
                      />
                      <img
                        class="scene-image scene-pot"
                        src="assets/ingredients/cooking-pot.svg"
                        alt=""
                      />
                      <img
                        class="scene-image scene-plate"
                        src="assets/ingredients/plate-empty.svg"
                        alt=""
                      />
                      <span class="rolling-pin"></span>
                      <span class="knife"></span>
                      <span class="dough-shape"></span>
                      <span class="dough-piece piece-one"></span>
                      <span class="dough-piece piece-two"></span>
                      <span class="dough-piece piece-three"></span>
                      <span class="jam-dot jam-one"></span>
                      <span class="jam-dot jam-two"></span>
                      <span class="jam-dot jam-three"></span>
                      <span class="press press-one"></span>
                      <span class="press press-two"></span>
                      <span class="press press-three"></span>
                      <span class="perky-piece perky-one"></span>
                      <span class="perky-piece perky-two"></span>
                      <span class="perky-piece perky-three"></span>
                      <span class="strainer"></span>
                      <span class="sprinkle sprinkle-one"></span>
                      <span class="sprinkle sprinkle-two"></span>
                      <span class="sprinkle sprinkle-three"></span>
                    </div>
                    <span
                      id="stage-label"
                      class="stage-label"
                      aria-live="polite"
                    ></span>
                    <span class="bowl-rim"></span>
                    <span id="bowl-placeholder" class="bowl-placeholder"
                      >Pusti surovinu sem</span
                    >
                    <div id="bowl-items" class="bowl-items"></div>
                  </div>
                </section>

                <section class="ingredients-shelf" aria-label="Ingrediencie">
                  <p class="column-title">Suroviny</p>
                  <div id="ingredient-bank" class="ingredient-bank"></div>
                </section>
              </section>

              <section
                class="process-actions-gastro"
                aria-label="Ovladanie receptu"
              >
                <button
                  id="start-recipe"
                  class="secondary-button"
                  type="button"
                >
                  Štart Ľ
                </button>

                <button id="reset-recipe" class="primary-button" type="button">
                  Reset
                </button>
              </section>
            </section>

            <dialog id="win-dialog">
              <div class="dialog-content">
                <h2 id="dialog-title"></h2>
                <img id="dialog-image" src="" alt="" hidden />
                <p id="result"></p>
                <button
                  id="play-again"
                  type="button"
                  onclick="this.closest('dialog').close()"
                >
                  Hrať znova
                </button>
              </div>
            </dialog>
          </div>
        </div>
      </div>
    </div>

    <script src="js/script_main.js"></script>
    <script src="js/script_gastronomia.js"></script>
  </body>
</html>
